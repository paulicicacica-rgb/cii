name: "09 — Save Money"

on:
  workflow_dispatch:
    inputs:
      lang:
        description: 'Language: en | es | zh | ar | pt | vi | tl | ko | ru | pl | all'
        required: true
        default: 'en'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic

      - name: Build
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 build.py --section=save-money --lang=${{ github.event.inputs.lang }}

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "build: save-money [${{ github.event.inputs.lang }}]"
          git fetch origin main
          git merge -X theirs origin/main --no-edit || true
          git push origin main
