name: Audit Thin Content

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 6am

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Audit thin content
        run: python3 audit_thin_content.py .

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: thin-content-report
          retention-days: 7
          path: |
            audit_thin_content.py
