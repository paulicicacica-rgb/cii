name: "FIX — Inner pages Sarah + translation fixes"

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fix translations
        run: python3 fix_translations.py

      - name: Fix Sarah inner pages
        run: python3 fix_sarah_inner.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          find . -type d -name __pycache__ -exec rm -rf {} + 2>/dev/null || true
          git add -A
          git diff --staged --quiet || git commit -m "fix: revert over-translations + Sarah bigger on inner pages"
          git push --force origin main
